name: Deploy to Azure App Service

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Build (shared → web → api)
        run: pnpm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/apps/api deploy/apps/web

          # API: compiled output + Prisma schema/migrations
          cp -r apps/api/dist deploy/apps/api/
          cp -r apps/api/prisma deploy/apps/api/

          # Web: built frontend (served as static by NestJS)
          cp -r apps/web/dist deploy/apps/web/

          # Create production package.json: add prisma CLI as regular dep, remove workspace refs
          jq 'del(.dependencies["@ogade/shared"]) | del(.devDependencies) | del(.prisma) | .dependencies.prisma = "^5.20.0" | .scripts = { "start": "node apps/api/dist/main.js" }' apps/api/package.json > deploy/package.json

          # Bundle shared package for install at startup
          mkdir -p deploy/packages/shared
          cp -r packages/shared/dist deploy/packages/shared/
          cp packages/shared/package.json deploy/packages/shared/

          # Copy startup script
          cp scripts/start.sh deploy/start.sh
          chmod +x deploy/start.sh

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deploy
