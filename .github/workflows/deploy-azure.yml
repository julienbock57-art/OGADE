name: Deploy to Azure App Service

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Build (shared → web → api)
        run: pnpm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/apps/api deploy/apps/web

          # API: compiled output + Prisma schema/migrations
          cp -r apps/api/dist deploy/apps/api/
          cp -r apps/api/prisma deploy/apps/api/

          # Web: built frontend (served as static by NestJS)
          cp -r apps/web/dist deploy/apps/web/

          # Create production package.json (no workspace refs, no devDeps)
          jq 'del(.dependencies["@ogade/shared"]) | del(.devDependencies) | del(.prisma) | .scripts = { "start": "node apps/api/dist/main.js" }' apps/api/package.json > deploy/package.json

          # Install production dependencies (flat node_modules Azure understands)
          cd deploy
          npm install --omit=dev

          # Install Prisma CLI (needed for migrate deploy at startup)
          npm install prisma@5

          # Generate Prisma client for this platform
          npx prisma generate --schema=apps/api/prisma/schema.prisma

          # Add shared package into node_modules
          mkdir -p node_modules/@ogade/shared
          cp -r ../packages/shared/dist node_modules/@ogade/shared/
          cp ../packages/shared/package.json node_modules/@ogade/shared/

          # Write startup script (use heredoc with <<- to strip tabs)
          cat > start.sh <<'STARTEOF'
#!/bin/bash
set -e
cd /home/site/wwwroot

# If Oryx moved our node_modules, restore it
if [ -d _del_node_modules ]; then
  rm -rf node_modules
  mv _del_node_modules node_modules
fi

# If Oryx replaced node_modules with a symlink, remove it
if [ -L node_modules ]; then
  rm -f node_modules
fi

# Clean Oryx artifacts
rm -f node_modules.tar.gz oryx-manifest.toml

if [ ! -f node_modules/.bin/prisma ]; then
  echo "FATAL: node_modules/.bin/prisma not found. Ensure SCM_DO_BUILD_DURING_DEPLOYMENT=false is set."
  ls -la node_modules/.bin/ 2>/dev/null || echo "node_modules/.bin/ does not exist"
  exit 1
fi

# Run Prisma migrations
./node_modules/.bin/prisma migrate deploy --schema=apps/api/prisma/schema.prisma

# Start the app
exec node apps/api/dist/main.js
STARTEOF
          chmod +x start.sh

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deploy
