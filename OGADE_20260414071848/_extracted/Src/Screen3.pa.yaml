                  LayoutDirection: =LayoutDirection.Horizontal
                  RadiusBottomLeft: =12
                  RadiusBottomRight: =12
                  RadiusTopLeft: =12
                  RadiusTopRight: =12
                  Width: =320
                  Y: =40
                Children:
