                        BasePaletteColor: =RGBA(8, 222, 8, 1)
                        Height: =27
                        Icon: ="Send"
                        IconStyle: ='ButtonCanvas.IconStyle'.Filled
                        OnSelect: "=If(\n    'FormulaireDemandeD''envoiMatériel_2'.Valid,\n    // Pour la partie matériels  : Similaire au code dans la demande d'envoi multiple matériels \n    ClearCollect(\n        PanierTransfert2,\n        AddColumns(\n            PanierTransfert,\n            IDMatériel,\n            Value (ID)\n        )\n    );\n    ForAll(\n        PanierTransfert2,\n        Patch(\n            'Gestion matériel END',\n            LookUp(\n                'Gestion matériel END',\n                IDMatériel = ThisRecord.ID\n            ),\n            {\n                Groupe: {Value: DataCardValue61_1.Selected.Value},\n                'En transit ': {Value: \"En attente\"}\n            }\n        )\n    );\n    SubmitForm('FormulaireDemandeD''envoiMatériel_2');\n    ForAll(\n        PanierTransfert2,\n        Patch(\n            'Sous-demandes d''envoi matériel',\n            Defaults('Sous-demandes d''envoi matériel'),\n            {\n                Statut: {Value: \"Nouvelle\"},\n                Matériel: {\n                    Id: ThisRecord.ID,\n                    Value: ThisRecord.Titre\n                },\n                'Demande d''envoi associée': {\n                    Id: 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.ID,\n                    Value: 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.Titre\n                }\n            }\n        )\n    );\n    \n    \n    // Met à jour la liste des maquettes pour indiquer que la maquette est en cours d'envoi\n\n\nClearCollect(\n        PanierTransfertMaquette2,\n        AddColumns(\n            PanierTransfertMaquette,\n            IDMaquette,\n            Value (ID)\n        ));\nForAll(\n        PanierTransfertMaquette2,\n        Patch(\n            'Gestion des maquettes',\n            LookUp(\n                'Gestion des maquettes',\n                IDMaquette = ThisRecord.ID\n            ),\n            {'En transit': {Value: \"Envoi en attente\"}}\n        );\n        Patch(\n            'Demandes d''envoi maquette',\n            Defaults('Demandes d''envoi maquette'),\n            {\n                Statut: {Value: \"Nouvelle\"},\n                Maquette: {\n                    Id: ThisRecord.ID,\n                    Value: ThisRecord.Référence\n                }, \n        'ID Demande envoi mère': 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.ID, \n        'Date de réception souhaitée': 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.'Date de réception souhaitée', \n        'Destinataire : Adresse': 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.'Destinataire : Adresse' , \n        'Destinataire : Entreprise': 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.'Destinataire : Entreprise' , \n        'Destinataire : Nom': 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.'Destinataire : Nom', \n        'Motif de l''envoi': 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.'Motif de l''envoi', \n        'Destinataire : N° de téléphone': 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.'Destinataire : N° de téléphone',\n        'Destinataire : N° de voie': 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.'Destinataire : N° de voie', \n        'Destinataire : Nom de la voie': 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.'Destinataire : Nom de la voie' , \n        'Destinataire : Code postal': 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.'Destinataire : Code postal',\n        'Destinataire : Pays': 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.'Destinataire : Pays', \n        'Destinataire : Adresse mail': 'FormulaireDemandeD''envoiMatériel_2'.LastSubmit.'Destinataire : Adresse mail'\n            }\n        )\n    );\n\n\n        Office365Outlook.SendEmailV2(\n        If(!IsEmpty(PanierTransfertMaquette) , Concat(Filter('Agents et rôles OGADE' , 'Référent logistique DQI' = true Or 'Référent maquette admin' = true) , Agent.Email &\";\")) &\n        If(!IsEmpty(PanierTransfert) ,Concat(Filter('Agents et rôles',OGADE_Matériels_Admin = true),'Nom de l''agent'.Email & \";\")) \n         & LookUp('Gestion matériel END' , ID = 'FormulaireDemandeD''envoiMatériel'.LastSubmit.ID).'Responsable '.Email & \"disc-dsc-dqi-mag-sextant@edf.fr\" ,\n       \"[Mail automatique] Nouvelle demande d'envoi mutualisée \U0001F680\"   ,\n        \"Bonjour à tous, <br> <br> \n    Une demande d'envoi mutualisée vient d'être créée par \"&User().FullName & \". Afin de consulter et de VALIDER cette demande d'envoi, veuillez vous rendre sur OGADE dans l'onglet « Module logistique ». <br> <br>\n    Cordialement, <br> <br>\n    \" & User().FullName) ;\n\n\n    Navigate('Home Page');\n    Clear(PanierTransfert);\n    Clear(PanierTransfert2);\n    Clear(PanierTransfertMaquette),\n\n    \n    // Si le formulaire n'est pas valide, permet de la submit pour mettre en avant les champs avec erreur dans le formulaire.\n    SubmitForm('FormulaireDemandeD''envoiMatériel_2')\n)"
                        Text: ="Soumettre la demande d'envoi multiple"
                        Width: =319
                        X: =309
                        Y: =5
