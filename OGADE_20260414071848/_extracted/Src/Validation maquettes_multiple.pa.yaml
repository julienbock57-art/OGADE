                      Control: TypedDataCard@1.0.7
                      Variant: BlankCard
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Height: =61
                        Visible: |-
                          =If (IsBlank(ThisItem.'Validation pôle logistique') , If (IsBlank(LookUp('Demandes d''envoi maquette', ID = IDMaquetteENVOI).'Validation pôle logistique') Or User().Email <> LookUp('Demandes d''envoi maquette', ID = IDMaquetteENVOI).'Demande urgente : Manager '.Email, true ,  false ) , false )
                        Width: =576
                        X: =0
                        Y: =7
                      Children:
                        - ButtonCanvas6_7:
                            Control: Button@0.0.45
                            Properties:
                              BasePaletteColor: =RGBA(249, 83, 109, 1)
                              Height: =31
                              Icon: ="DismissCircle"
                              Layout: ='ButtonCanvas.Layout'.IconAfter
                              OnSelect: "=Set(StatutValidationpôleLogistique,\n    Blank());\nSet(showContainer, true);\n\nForAll(\n    Gallery1_2.AllItems As item,\n    Patch(\n        'Demandes d''envoi maquette',\n        LookUp(\n            'Demandes d''envoi maquette',\n            ID = item.ID\n        ),\n        {\n            'Validation pôle logistique': {Value: \"Refus\"},\n            Statut: {Value: \"Refusé\"},\n            'Référent logistique ayant validé la demande': {\n                Claims : \"i:0#.f|membership|\" & First('Utilisateursd’Office365'.SearchUserV2({searchTerm:User().Email}).value).UserPrincipalName,\n                Department : First('Utilisateursd’Office365'.SearchUserV2({searchTerm:User().Email}).value).Department,\n                DisplayName : User().FullName,\n                Email : User().Email,\n                JobTitle : First('Utilisateursd’Office365'.SearchUserV2({searchTerm:User().Email}).value).JobTitle,\n                Picture : User().Image\n            },\n           'Date de validation pôle logistique': Now()\n        }\n    )\n);\n\nIf(\n    !IsBlank(LookUp(\n            'Demandes d''envoi maquette',\n            ID = First(Gallery1_2.AllItems).ID\n        ).'Créé par'.Email) &&\n    !IsBlank(LookUp(\n            'Demandes d''envoi maquette',\n            ID = First(Gallery1_2.AllItems).ID\n        ).'Référent logistique ayant validé la demande'.Email),\n    \n    Office365Outlook.SendEmailV2(\n        LookUp(\n            'Demandes d''envoi maquette',\n            ID = First(Gallery1_2.AllItems).ID\n        ).'Créé par'.Email & \";\" & LookUp(\n            'Demandes d''envoi maquette',\n            ID = First(Gallery1_2.AllItems).ID\n        ).'Référent logistique ayant validé la demande'.Email,\n        \"[Mail automatique] ❌ Refus de la demande d'envoi de la maquette : \" & LookUp(\n            'Demandes d''envoi maquette',\n            ID = First(Gallery1_2.AllItems).ID\n        ).Maquette.Value,\n        \"Bonjour à tous,<br><br> \n        La demande d'envoi pour la maquette référencée « \" & LookUp(\n            'Demandes d''envoi maquette',\n            ID = First(Gallery1_2.AllItems).ID\n        ).Maquette.Value & \" » vient d'être refusée. Afin de consulter cette demande d'envoi, veuillez vous rendre sur OGADE dans l'onglet « Gestion des envois/réceptions SEXTANT ». <br><br>\n        Cordialement,<br><br>\n        \" & User().FullName\n    )\n);\n\n\n\n"
                              Text: ="Refus"
                              Width: =152
                              X: =20
                              Y: =15
                        - ButtonCanvas6_8:
                            Control: Button@0.0.45
                            Properties:
                              BasePaletteColor: =RGBA(8, 222, 8, 1)
                              Height: =31
                              Icon: ="CheckmarkCircle"
                              OnSelect: |
                                =Set(StatutValidationpôleLogistique,
                                    Blank());

                                ForAll(
                                    Gallery1_2.AllItems As item,
                                    Patch(
                                        'Demandes d''envoi maquette',
                                        LookUp(
                                            'Demandes d''envoi maquette',
                                            ID = item.ID
                                        ),
                                        {
                                            'Validation pôle logistique': {Value: "Oui"},
                                            Statut: {Value: "Envoi en attente"},
                                            'Motif du refus': Blank(),
                                            'Référent logistique ayant validé la demande': {
                                                Claims : "i:0#.f|membership|" & First('Utilisateursd’Office365'.SearchUserV2({searchTerm:User().Email}).value).UserPrincipalName,
                                                Department : First('Utilisateursd’Office365'.SearchUserV2({searchTerm:User().Email}).value).Department,
                                                DisplayName : User().FullName,
                                                Email : User().Email,
                                                JobTitle : First('Utilisateursd’Office365'.SearchUserV2({searchTerm:User().Email}).value).JobTitle,
                                                Picture : User().Image
                                            },
                                            'Date de validation référent maquette': Now()
                                        }
                                    )
                                );


                                Office365Outlook.SendEmailV2(
                                    Concat(
                                        Filter(
                                            'Agents et rôles OGADE',
                                            Magasinier = true
                                        ),
                                        Agent.Email & ";"
                                    ),
                                    "[Mail automatique] Nouvelle demande d'envoi à traiter : " & LookUp(
                                            'Demandes d''envoi maquette',
                                            ID = First(Gallery1_2.AllItems).ID
                                        ).Maquette.Value,
                                    "Bonjour à tous, <br><br> 
                                    Une demande d'envoi pour la maquette référencée « " & LookUp(
                                            'Demandes d''envoi maquette',
                                            ID = First(Gallery1_2.AllItems).ID
                                        ).Maquette.Value & " » est en attente. Afin de consulter cette demande d'envoi, veuillez vous rendre sur OGADE dans l'onglet « Gestion des envois/réceptions SEXTANT ». <br><br>
                                    Cordialement, <br><br>
                                    " & User().FullName
                                )
                              Text: ="Validation"
                              Width: =152
                              X: =350
                              Y: =15
