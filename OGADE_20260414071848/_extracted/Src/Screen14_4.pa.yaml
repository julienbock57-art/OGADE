éférencé « \" & LookUp('Sous-demandes d''envoi matériel' , 'Demande d''envoi associée: ID'.Value = 'FormulaireDemandeD''envoiMatériel'.LastSubmit.ID).Matériel.Value & \" ». Afin de consulter et de VALIDER cette demande d'envoi, veuillez vous rendre sur OGADE dans l'onglet « Module logistique ». <br> <br>\n    Cordialement, <br> <br>\n    \" & User().FullName);\n    \n    Navigate(Screen14),\n\n    //ELSE\n    SubmitForm('FormulaireDemandeD''envoiMatériel')\n)"
