                  OnSelect: "=If(\n    'FormulaireDemandeD''envoiMatériel_1'.Valid,\n\n    ClearCollect(PanierTransfert2 , AddColumns(PanierTransfert , IDMatériel , Value (ID)));\n    ForAll(PanierTransfert2 , \n    Patch(\n        'Gestion matériel END',\n        LookUp('Gestion matériel END' , IDMatériel = ThisRecord.ID),\n        {\n            Groupe: {Value: DataCardValue61_1.Selected.Value},\n            'En transit ': {Value :\"En attente\"}\n        }\n    ));\n\n    SubmitForm('FormulaireDemandeD''envoiMatériel_1');\n    \n    ForAll(PanierTransfert2 , Patch(\n        'Sous-demandes d''envoi matériel',\n        Defaults('Sous-demandes d''envoi matériel'),\n        {\n            Statut: {Value: \"Nouvelle\"},\n            Matériel: {\n                Id: ThisRecord.ID,\n                Value: ThisRecord.Titre\n            }\n            , \n        'Demande d''envoi associée': {Id: 'FormulaireDemandeD''envoiMatériel_1'.LastSubmit.ID , Value: 'FormulaireDemandeD''envoiMatériel_1'.LastSubmit.Titre}\n\n        }\n    ));\n\n     Office365Outlook.SendEmailV2(\n        If(! IsBlank(PanierTransfert) , Concat(Filter('Agents et rôles OGADE' , 'Référent logistique DQI' = true Or 'Référent maquette admin' = true) , Agent.Email &\";\")) &\n        If(! IsBlank(PanierTransfertMaquette) ,Concat(Filter('Agents et rôles',OGADE_Matériels_Admin = true),'Nom de l''agent'.Email & \";\")) \n         & LookUp('Gestion matériel END' , ID = 'FormulaireDemandeD''envoiMatériel'.LastSubmit.ID).'Responsable '.Email & \"disc-dsc-dqi-mag-sextant@edf.fr\" ,\n       \"[Mail automatique] Nouvelle demande d'envoi mutualisée \U0001F680\"   ,\n        \"Bonjour à tous, <br> <br> \n    Une demande d'envoi mutualisée vient d'être créée par \"&User().FullName & \". Afin de consulter et de VALIDER cette demande d'envoi, veuillez vous rendre sur OGADE dans l'onglet « Module logistique ». <br> <br>\n    Cordialement, <br> <br>\n    \" & User().FullName) ;\n    \n    Navigate(Screen14); \n    Clear(PanierTransfert);\n    Clear(PanierTransfert2),\n    SubmitForm('FormulaireDemandeD''envoiMatériel_1')\n)\n\n"
