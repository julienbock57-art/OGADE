            - ButtonCanvas2_11:
                Control: Button@0.0.45
                Properties:
                  BasePaletteColor: =RGBA(5, 102, 178, 1)
                  DisplayMode: "=If(\n    CountRows(\n        Filter(\n            'Sous-demandes d''envoi matériel',\n            'Demande d''envoi associée'.Value = Text(IDMatérielENVOI),\n            'Validation référent matériel'.Value = Blank()\n        )\n    ) + CountRows(\n        Filter(\n            'Demandes d''envoi maquette',\n            'ID Demande envoi mère' = IDMatérielENVOI,\n            Statut.Value = \"Nouvelle\"\n        )\n    ) = 0,\n    \n        If( LookUp('Demandes d''envoi matériel', ID = IDMatérielENVOI).Statut.Value = \"Nouvelle\" , DisplayMode.Edit , DisplayMode.View )\n    ,\n    DisplayMode.View\n)"
                  Height: =34
                  Icon: ="CheckmarkCircle"
                  Layout: ='ButtonCanvas.Layout'.IconAfter
                  OnSelect: "=Patch(\n    'Demandes d''envoi matériel',\n    LookUp(\n        'Demandes d''envoi matériel',\n        ID = IDMatérielENVOI\n    ),\n    {\n        Statut: {\n            Value: If(\n                CountRows(\n                    Filter(\n                        'Sous-demandes d''envoi matériel',\n                        'Demande d''envoi associée'.Value = Text(IDMatérielENVOI),\n                        'Validation référent matériel'.Value = \"Oui\"\n                    )\n                ) + CountRows(\n                    Filter(\n                        'Demandes d''envoi maquette',\n                        'ID Demande envoi mère' = IDMatérielENVOI, \n                        Statut.Value = \"Envoi en attente\"\n                    )\n                ) = 0,\n                \"Refus\",\n                \"Envoi en attente\"\n            )\n        },\n        'Validation référent matériel': {\n            Value: If(\n                CountRows(\n                    Filter(\n                        'Sous-demandes d''envoi matériel',\n                        'Demande d''envoi associée'.Value = Text(IDMatérielENVOI),\n                        'Validation référent matériel'.Value = \"Refus\"\n                    )\n                ) + CountRows(\n                    Filter(\n                        'Demandes d''envoi maquette',\n                        'ID Demande envoi mère' = IDMatérielENVOI, \n                        Statut.Value = \"Refus\"\n                    )\n                )  = 0,\n                \"Oui\",\n                If(\n                    CountRows(\n                        Filter(\n                            'Sous-demandes d''envoi matériel',\n                            'Demande d''envoi associée'.Value = Text(IDMatérielENVOI),\n                            'Validation référent matériel'.Value = \"Oui\"\n                        )\n                    ) +  CountRows(\n                    Filter(\n                        'Demandes d''envoi maquette',\n                        'ID Demande envoi mère' = IDMatérielENVOI, \n                        Statut.Value = \"Envoi en attente\"\n                    )\n                ) = 0,\n                    \"Refus\",\n                    \"Validation partielle\"\n                )\n            )\n        }\n    }\n);\nIf(         CountRows(\n                    Filter(\n                        'Sous-demandes d''envoi matériel',\n                        'Demande d''envoi associée'.Value = Text(IDMatérielENVOI),\n                        'Validation référent matériel'.Value = \"Oui\"\n                    )\n                ) + CountRows(\n                    Filter(\n                        'Demandes d''envoi maquette',\n                        'ID Demande envoi mère' = IDMatérielENVOI, \n                        Statut.Value = \"Envoi en attente\"\n                    )\n                ) <> 0,Office365Outlook.SendEmailV2(\n        Concat(\n            Filter(\n                'Agents et rôles OGADE',\n                Magasinier = true \n            ),\n        Agent.Email & \";\" \n        ) & LookUp('Gestion matériel END' , ID = 'FormulaireDemandeD''envoiMatériel'.LastSubmit.ID).'Responsable '.Email ,\n       \"[Mail automatique] Envoi en attente \U0001F680\"   &\" pour la demande n° : \" & IDMatérielENVOI  ,\n        \"Bonjour à tous, <br> <br> \n    Une demande d'envoi est en attente, pour le demande n° \" & IDMatérielENVOI & \" ». Afin de consulter cette demande d'envoi, veuillez vous rendre sur OGADE dans l'onglet « Module logistique ». <br> <br>\n    Cordialement, <br> <br>\n    \" & User().FullName)\n                             \n            )\n \n    ;\nSet(\n    ModuleMagasinEnvoiMatérielValidation,\n    false\n);\nSet(\n    ModuleMagasinEnvoiduMatériel,\n    true\n)"
                  Text: ="2. Validation demande mère"
                  Width: =245
                  X: =791
                  Y: =600
