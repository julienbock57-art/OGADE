 ).Maquette.Id\n        ),\n        {\n            Localisation: {Value: MagasinFormMaquetteINformationsEnvoiFinal.LastSubmit.'Destinataire : Adresse'},\n            'Localisation : Entreprise': {Value: MagasinFormMaquetteINformationsEnvoiFinal.LastSubmit.'Destinataire : Entreprise'},\n            'En transit': {Value: \"OUI\"},\n            Localisation_Rayonnage: Blank(),\n            Localisation_Salle: Blank() ,\n            'Compléments localisation': Blank()\n            \n        }\n    )\n)"
