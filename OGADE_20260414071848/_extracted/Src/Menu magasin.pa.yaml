                  FontWeight: =FontWeight.Normal
                  Height: =34
                  Icon: ="Send"
                  Layout: ='ButtonCanvas.Layout'.IconAfter
                  OnSelect: "=If(\n    MagasinFormMatérielINformationsEnvoiFinal.Valid,\n    Clear(IDSousDemandesPourEnvoi);\n    Collect(\n        IDSousDemandesPourEnvoi,\n        ShowColumns(\n            Filter(\n                'Sous-demandes d''envoi matériel',\n                'Demande d''envoi associée'.Value = Text(IDMatérielENVOI), \n                'Validation référent matériel'.Value = \"Oui\"\n            ),\n            'Demande d''envoi associée',\n            Matériel, \n            'Motif refus envoi', \n            ID\n        )\n    );\n    ClearCollect(NewCollection , AddColumns(IDSousDemandesPourEnvoi , IDMatérielCollection,Value(Maquette.Id)));\n    // Maquette est la vrai nom de matériel https://edfonline.sharepoint.com/sites/DISC-DSC-DQI-BTN/_layouts/15/FldEditEx.aspx?List=%7B10CA23CC%2D154D%2D445F%2D9B89%2DEC0D7302CF6F%7D&Field=Maquette\n\n    ClearCollect(NewCollectionIDSousDemandesPourEnvoi , AddColumns(NewCollection , IDSousDemande,Value(ID))); \n\n\n    ForAll(\n        NewCollectionIDSousDemandesPourEnvoi,\n        Patch(\n            'Sous-demandes d''envoi matériel',\n            LookUp(\n                'Sous-demandes d''envoi matériel',\n                IDSousDemande = ThisRecord.ID\n            ),\n            {Statut: {Value: \"Soldée\"}}\n        )\n    );\n\n    SubmitForm(MagasinFormMatérielINformationsEnvoiFinal);\n\n    ForAll(\n        NewCollectionIDSousDemandesPourEnvoi,\n        Patch(\n            'Gestion matériel END',\n            LookUp(\n                'Gestion matériel END',\n                ThisRecord.ID = IDMatérielCollection\n            ),\n            {'En transit ': {Value: \"Oui\"},\n            Entreprise: {Value : MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.'Destinataire : Entreprise'} , \n            Groupe: MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.Groupe, \n            Site: {Value : MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.'Destinataire : Nom du site'},\n            Historique: \"- Le materiel a été envoyé à : \" & MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.'Destinataire : Adresse' & \" le \" & Today() &\" \n            \" & LookUp(\n                'Gestion matériel END',\n                ThisRecord.ID = IDMatérielCollection\n            ).Historique }\n        )\n    );\n\n    \n\n    \n    Collect(\n        IDDemandesPourEnvoiMaquette,\n        ShowColumns(\n            Filter(\n                'Demandes d''envoi maquette',\n                'ID Demande envoi mère' = IDMatérielENVOI, \n                ValidationpôleLogistique = \"Oui\" , \n                ValidationRéférentMaquette = \"Oui\"\n            ),\n            'ID Demande envoi mère',\n            Maquette, \n            ID\n        )\n    );\n    ClearCollect(NewCollectionMaquette , AddColumns(IDDemandesPourEnvoiMaquette , IDMaquetteCollection,Value(Maquette.Id)));\n    ClearCollect(NewCollectionIDSousDemandesPourEnvoiMaquette , AddColumns(NewCollectionMaquette , IDSousDemandeMaquette,Value(ID))); \n\n    ForAll(NewCollectionMaquette, \n    \n    Patch(\n        'Gestion des maquettes',\n        LookUp(\n            'Gestion des maquettes', ThisRecord.ID = IDMaquetteCollection\n            ),{\n            Localisation: {Value: MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.'Destinataire : Adresse'},\n            'Localisation : Entreprise': {Value: MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.'Destinataire : Entreprise'},\n            'En transit': {Value: \"OUI\"},\n            Localisation_Rayonnage: Blank(),\n            Localisation_Salle: Blank() ,\n            'Compléments localisation': Blank()\n        }\n    ));\n\n\n    ForAll(NewCollectionIDSousDemandesPourEnvoiMaquette , \n\n    Patch('Demandes d''envoi maquette' , LookUp('Demandes d''envoi maquette',ThisRecord.ID = IDSousDemandeMaquette)  , \n    {Statut: {Value: \"Soldée\"}}\n\n    ));\n\n\n   Office365Outlook.SendEmailV2(\n        //!IsEmpty(NewCollectionMaquette)\n        If(!IsEmpty(NewCollectionMaquette), Concat(Filter('Agents et rôles OGADE' , 'Référent logistique DQI' = true Or 'Référent maquette admin' = true ) , Agent.Email & \"; \") & \"disc-dsc-demandes-maquettes@edf.fr\", \"\") & \"; \" & \n        If(!IsEmpty(NewCollection) ,Concat(Filter('Agents et rôles',OGADE_Matériels_Admin = true),'Nom de l''agent'.Email & \"; \"), \"\")\n        &\n        If(!IsBlank(MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.'Créé par'.Email), MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.'Créé par'.Email & \"; \", \"\") &\n        User().Email & \n        If(!IsBlank(MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.'Destinataire : Adresse mail'), \"; \" & MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.'Destinataire : Adresse mail', \"\") & \"; \" & \"disc-dsc-dqi-mag-sextant@edf.fr\"\n        ,\n        \"[Mail automatique] Envoi des matériels/maquettes ✅\U0001F69A\",\n        \"Bonjour à tous, <br> <br> \n    Les matériels et/ou maquettes suivant ont été envoyés : \n    \" & Concat(Filter('Sous-demandes d''envoi matériel' , IDMatérielENVOI = Value('Demande d''envoi associée'.Value)), \"• \"& Matériel.Value &\"<br>\n    \") &  Concat(Filter('Demandes d''envoi maquette' , IDMatérielENVOI = 'ID Demande envoi mère' , 'Validation pôle logistique'.Value = \"Oui\" , 'Validation référent maquette'.Value = \"Oui\"), \"• \"& Maquette.Value &\"<br>\n    \") & \"  \n   La destination est : \" & MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.'Destinataire : Entreprise' & \", \" & MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.'Destinataire : Adresse' & \". Le destinataire est : \"  & MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.'Destinataire : Nom' &  \".\n   Vous trouverez en pièce jointe de ce mail le bon d'envoi associé. <br> <br>\n    Cordialement, <br> <br>\n    \" & User().FullName,\n        {\n            Attachments: ForAll(\n                MagasinFormMatérielINformationsEnvoiFinal.LastSubmit.'Pièces jointes',\n                {\n                    ContentBytes: Value,\n                    Name: DisplayName\n                } )\n                \n            \n        }\n    );\n\n\n\n    Set(\n        ModuleMagasinEnvoidelaMatérielFinal,\n        false\n    ),\n    SubmitForm(MagasinFormMatérielINformationsEnvoiFinal)\n)"
