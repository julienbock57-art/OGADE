services:
  postgres:
    image: postgres:15-alpine
    container_name: ogade-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ogade
      POSTGRES_PASSWORD: ogade
      POSTGRES_DB: ogade
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ogade"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
